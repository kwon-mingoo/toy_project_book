<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<!--
    공통 레이아웃 프래그먼트
    Thymeleaf Fragment: th:fragment 로 선언한 조각을 다른 페이지에서 th:replace 로 삽입
-->

<!-- 공통 <head> 프래그먼트: 각 페이지에서 th:replace="~{layout/default :: head('페이지명')}" 으로 사용 -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - 도서 관리 시스템'">도서 관리 시스템</title>
    <!-- Bootstrap 5 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- 커스텀 CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- 공통 내비게이션 바 프래그먼트 -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/books}">
            <i class="bi bi-book-half me-1"></i> 도서 관리 시스템
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}">
                        <i class="bi bi-list-ul"></i> 도서 목록
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books/new}">
                        <i class="bi bi-plus-circle"></i> 도서 등록
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 공통 푸터 프래그먼트 -->
<footer th:fragment="footer" class="bg-light text-center py-3 mt-5 border-top">
    <small class="text-muted">
        도서 관리 시스템 &copy; 2024 &nbsp;|&nbsp; Spring Boot 3.2 + MyBatis + Oracle XE
    </small>
</footer>

<!-- 공통 스크립트 프래그먼트 -->
<div th:fragment="scripts">
    <!-- Bootstrap 5 JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery (CDN) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- 커스텀 JS -->
    <script th:src="@{/js/book.js}"></script>
</div>

</body>
</html>
