<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/default :: head('페이지를 찾을 수 없음')}"></head>

<body class="bg-light">

<nav th:replace="~{layout/default :: navbar}"></nav>

<div class="container my-5 text-center">
    <i class="bi bi-exclamation-triangle-fill display-1 text-warning"></i>
    <h2 class="mt-3 fw-bold">요청하신 데이터를 찾을 수 없습니다.</h2>
    <p class="text-muted mt-2" th:text="${errorMessage}">오류 메시지</p>
    <a th:href="@{/books}" class="btn btn-primary mt-3">
        <i class="bi bi-house me-1"></i> 목록으로 돌아가기
    </a>
</div>

<footer th:replace="~{layout/default :: footer}"></footer>
<div th:replace="~{layout/default :: scripts}"></div>

</body>
</html>
